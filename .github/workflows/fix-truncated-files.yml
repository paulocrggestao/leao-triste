name: Fix Truncated Files

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-truncated-files.yml'

permissions:
  contents: write

jobs:
  fix-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download xml_parser.py from catbox.moe
        run: |
          curl -L -o xml_parser.py "https://files.catbox.moe/ejrb8k.py"
          echo "xml_parser.py size: $(wc -c < xml_parser.py) bytes"

      - name: Download index.html from catbox.moe
        run: |
          curl -L -o index.html "https://files.catbox.moe/8ghbra.html"
          echo "index.html size: $(wc -c < index.html) bytes"

      - name: Commit and push fixed files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add xml_parser.py index.html
          git diff --cached --stat
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fix truncated files: restore full xml_parser.py and index.html"
            git push
          fi
