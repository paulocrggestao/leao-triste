name: Restore Truncated Files

on:
  push:
    paths:
      - '.github/workflows/restore-files.yml'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download api_server.py from catbox
        run: |
          curl -sL https://files.catbox.moe/fxbvfy.py -o api_server.py
          echo "Downloaded api_server.py: $(wc -c < api_server.py) bytes"

      - name: Download analysis_engine.py from catbox
        run: |
          curl -sL https://files.catbox.moe/3jq8z2.py -o analysis_engine.py
          echo "Downloaded analysis_engine.py: $(wc -c < analysis_engine.py) bytes"

      - name: Commit restored files
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add api_server.py analysis_engine.py
          git status
          git diff --cached --stat
          git commit -m "Restore full content of api_server.py (138818 bytes) and analysis_engine.py (43247 bytes)"
          git push
