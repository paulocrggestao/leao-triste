name: Restore app.js

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/restore-app-js.yml'
  workflow_dispatch:

jobs:
  restore:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download app.js from temporary storage
        run: |
          curl -sL -o app.js "http://tmpfiles.org/dl/27476981/app_js_content.txt"
          echo "Downloaded size: $(wc -c < app.js) bytes"
          echo "Downloaded lines: $(wc -l < app.js) lines"
          head -3 app.js

      - name: Verify content
        run: |
          SIZE=$(wc -c < app.js)
          echo "File size: $SIZE bytes"
          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: File too small, expected ~124209 bytes, got $SIZE"
            exit 1
          fi
          echo "Size OK: $SIZE bytes"

      - name: Commit and push app.js
        run: |
          git config user.email "paulo@eco1.com.br"
          git config user.name "paulocrggestao"
          git add app.js
          git diff --cached --stat
          git commit -m "Add frontend SPA (app.js)" || echo "Nothing to commit"
          git push

      - name: Remove this workflow file
        run: |
          git rm .github/workflows/restore-app-js.yml
          git commit -m "Remove restore workflow (cleanup)"
          git push
