<!DOCTYPE html>

<head>

<link rel="preconnect" href="https://fonts.googleapis.com">

<body>

      <a class="nav-item" data-route="/clientes" onclick="navigate('/clientes')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="16" height="20" x="4" y="2" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></svg>
        Clientes
      </a>
      <a class="nav-item" data-route="/relatorios" onclick="navigate('/relatorios')">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="18" y1="20" y2="10"/><line x1="12" x2="12" y1="20" y2="4"/><line x1="6" x2="6" y1="20" y2="14"/></svg>
        Relatórios
      </a>
      <a class="nav-item" data-route="/ncm" onclick="navigate('/ncm')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 7V4h16v3"/><path d="M9 20h6"/><path d="M12 4v16"/></svg>
        Base NCM
      </a>
      <a class="nav-item" data-route="/produtos" onclick="navigate('/produtos')">

      <div class="nav-separator"></div>

    <div class="sidebar-footer">
      <div class="sidebar-footer-company">CRG Gestão Contábil</div>
      <div class="sidebar-footer-sub">Recuperação Tributária</div>
    </div>
  </nav>

  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <button class="hamburger" onclick="openSidebar()" aria-label="Abrir menu">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
      </button>
      <div class="breadcrumb" id="breadcrumb">
        <span>Início</span>
      </div>
    </div>
    <div class="header-right">
      <button class="theme-toggle-btn" id="theme-toggle" onclick="toggleTheme()" aria-label="Alternar tema" data-theme-toggle>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </button>
    </div>
  </header>

  <!-- Main Content -->
  <main class="main" id="main-content">
    <!-- Content rendered by JS -->
  </main>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="event.target===this&&closeModal()">
  <div class="modal" id="modal-content" onclick="event.stopPropagation()">
    <!-- Modal content rendered by JS -->
  </div>
</div>

<!-- Footer attribution (inside main, rendered at bottom) -->
<script>
  // Add footer to main on load
  document.addEventListener('DOMContentLoaded', function() {
    var mainEl = document.getElementById('main-content');
    if (mainEl) {
      var observer = new MutationObserver(function() {
        // Ensure footer is always at bottom of main
        var existing = mainEl.querySelector('.app-footer');
        if (!existing) {
          var footer = document.createElement('footer');
          footer.className = 'app-footer';
          footer.innerHTML = '<span>CRG Gestão Contábil &mdash; Recuperação Tributária</span>';
          mainEl.appendChild(footer);
        }
      });
      observer.observe(mainEl, { childList: true });
    }
  });
</script>
<script src="./app.js"></script>
</body>
</html>
